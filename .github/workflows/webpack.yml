name: Build and Release All Platforms

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1

jobs:
  # Create GitHub Release
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Personal Finance Tracker ${{ github.ref_name }}
          body: |
            ## Download Available For:
            - 🐧 Linux (x86_64)
            - 🪟 Windows (x86_64)
            - 🍎 macOS (Intel & Apple Silicon)
            - 🤖 Android (APK)
            - 📱 iOS (App)
          draft: false
          prerelease: false

  # Linux Desktop Build
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri:build -- --target x86_64-unknown-linux-gnu

      - name: Prepare artifacts
        run: |
          mkdir -p release-artifacts
          cp -r src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/* release-artifacts/ 2>/dev/null || true
          cp -r src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/* release-artifacts/ 2>/dev/null || true

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./release-artifacts/
          asset_name: personal-finance-tracker-linux-x64
          asset_content_type: application/octet-stream
    needs: create-release

  # Windows Desktop Build
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri:build -- --target x86_64-pc-windows-msvc

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/x86_64-pc-windows-msvc/release/personal-finance-tracker.exe
          asset_name: personal-finance-tracker-windows-x64.exe
          asset_content_type: application/octet-stream
    needs: create-release

  # macOS Desktop Build (Intel)
  build-macos-intel:
    name: Build macOS Desktop (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri:build -- --target x86_64-apple-darwin

      - name: Create DMG
        run: |
          cd src-tauri/target/x86_64-apple-darwin/release/bundle/macos
          hdiutil create -volname "Personal Finance Tracker" -srcfolder . -ov -format UDZO personal-finance-tracker-macos-intel.dmg

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/x86_64-apple-darwin/release/bundle/macos/personal-finance-tracker-macos-intel.dmg
          asset_name: personal-finance-tracker-macos-intel.dmg
          asset_content_type: application/octet-stream
    needs: create-release

  # macOS Desktop Build (Apple Silicon)
  build-macos-arm64:
    name: Build macOS Desktop (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri:build -- --target aarch64-apple-darwin

      - name: Create DMG
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          hdiutil create -volname "Personal Finance Tracker" -srcfolder . -ov -format UDZO personal-finance-tracker-macos-arm64.dmg

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./src-tauri/target/aarch64-apple-darwin/release/bundle/macos/personal-finance-tracker-macos-arm64.dmg
          asset_name: personal-finance-tracker-macos-arm64.dmg
          asset_content_type: application/octet-stream
    needs: create-release

  # Android Build
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Setup React Native
        run: |
          npm install -g eas-cli

      - name: Create React Native Expo project
        run: |
          mkdir -p mobile
          cd mobile
          npx create-expo-app personal-finance-tracker

      - name: Build Android APK
        run: |
          cd mobile/personal-finance-tracker
          npm install
          npx eas build --platform android --local --output=../../personal-finance-tracker.apk

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./personal-finance-tracker.apk
          asset_name: personal-finance-tracker-android.apk
          asset_content_type: application/vnd.android.package-archive
    needs: create-release

  # iOS Build
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods

      - name: Create React Native Expo project
        run: |
          mkdir -p mobile
          cd mobile
          npx create-expo-app personal-finance-tracker

      - name: Build iOS App
        run: |
          cd mobile/personal-finance-tracker
          npm install
          npx eas build --platform ios --local --output=../../personal-finance-tracker.ipa

      - name: Upload to Release
        uses: actions/upload-release-asset@v1
        if: needs.create-release.outputs.upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./personal-finance-tracker.ipa
          asset_name: personal-finance-tracker-ios.ipa
          asset_content_type: application/octet-stream
    needs: create-release
