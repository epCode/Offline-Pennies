name: Continuous Build & Draft Release

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1

jobs:
  # Generate version based on commit count
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.0.${COMMIT_COUNT}-${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Generated version: ${VERSION}"

  # Build desktop apps
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: personal-finance-tracker
            asset_name: personal-finance-tracker-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: personal-finance-tracker.exe
            asset_name: personal-finance-tracker-windows-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: personal-finance-tracker.app
            asset_name: personal-finance-tracker-macos-x64.app
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: personal-finance-tracker.app
            asset_name: personal-finance-tracker-macos-arm64.app

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        run: pnpm tauri:build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*
            src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          if-no-files-found: ignore
          retention-days: 30

  # Build Android APK
  build-android:
    name: Build Android APK
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Create Expo app
        run: |
          mkdir -p mobile
          cd mobile
          npx create-expo-app personal-finance-tracker

      - name: Build Android APK
        continue-on-error: true
        run: |
          cd mobile/personal-finance-tracker
          npm install
          npx eas build --platform android --local --output=../../personal-finance-tracker.apk 2>&1 || echo "EAS build skipped (requires credentials)"

      - name: Upload Android APK
        if: hashFiles('personal-finance-tracker.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: personal-finance-tracker-android
          path: personal-finance-tracker.apk
          retention-days: 30

  # Build iOS App
  build-ios:
    name: Build iOS App
    needs: version
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Create Expo app
        run: |
          mkdir -p mobile
          cd mobile
          npx create-expo-app personal-finance-tracker

      - name: Build iOS App
        continue-on-error: true
        run: |
          cd mobile/personal-finance-tracker
          npm install
          npx eas build --platform ios --local --output=../../personal-finance-tracker.ipa 2>&1 || echo "EAS build skipped (requires credentials)"

      - name: Upload iOS App
        if: hashFiles('personal-finance-tracker.ipa') != ''
        uses: actions/upload-artifact@v4
        with:
          name: personal-finance-tracker-ios
          path: personal-finance-tracker.ipa
          retention-days: 30

  # Create/Update draft release
  draft-release:
    name: Create Draft Release
    needs: [version, build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release notes
        id: release_notes
        run: |
          COMMIT_MESSAGE=$(git log -1 --pretty=%B)
          COMMIT_AUTHOR=$(git log -1 --pretty=%an)
          COMMIT_DATE=$(git log -1 --pretty=%ai)
          
          cat > release_notes.md << EOF
          ## Build Information
          - **Version**: ${{ needs.version.outputs.version }}
          - **Commit**: ${{ needs.version.outputs.short_sha }}
          - **Author**: ${COMMIT_AUTHOR}
          - **Date**: ${COMMIT_DATE}
          - **Branch**: ${GITHUB_REF#refs/heads/}
          
          ## Commit Message
          \`\`\`
          ${COMMIT_MESSAGE}
          \`\`\`
          
          ## Downloads
          - 🐧 **Linux** (AppImage & .deb)
          - 🪟 **Windows** (.exe & MSI)
          - 🍎 **macOS** (Intel & Apple Silicon)
          - 🤖 **Android** (.apk)
          - 📱 **iOS** (.ipa)
          
          ---
          **This is an automated build from continuous integration. Use at your own risk.**
          EOF
          
          cat release_notes.md

      - name: Create or update draft release
        uses: ncipollo/release-action@v1
        with:
          tag: build-${{ needs.version.outputs.version }}
          name: Build ${{ needs.version.outputs.version }}
          bodyFile: release_notes.md
          draft: true
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: artifacts/*/*

      - name: Comment on latest commit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const releaseNotes = fs.readFileSync('release_notes.md', 'utf8');
            
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `✅ **Build Successful**\n\n${releaseNotes}`
            });

  # Notify on failure
  notify-failure:
    name: Notify Build Failure
    runs-on: ubuntu-latest
    needs: [build-desktop, build-android, build-ios]
    if: failure()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Build failed',
              context: 'continuous-build'
            });
