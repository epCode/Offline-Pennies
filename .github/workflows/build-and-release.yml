name: "Build and Release"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            xvfb

      - name: install frontend dependencies
        run: pnpm install

      - name: setup virtual display (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo Xvfb :99 -screen 0 1024x768x24 -ac -nolisten tcp > /tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          sleep 2
          if ! kill -0 $XVFB_PID 2>/dev/null; then
            echo "Xvfb failed to start"
            cat /tmp/xvfb.log
            exit 1
          fi
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "XAUTHORITY=/tmp/.Xauthority" >> $GITHUB_ENV
          DISPLAY=:99 xset q || true

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform != 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Personal Finance Tracker v__VERSION__"
          releaseBody: "Automated build of Personal Finance Tracker"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - uses: tauri-apps/tauri-action@v0
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISPLAY: :99
          XAUTHORITY: /tmp/.Xauthority
          GDK_BACKEND: x11
          LIBGL_ALWAYS_INDIRECT: 1
        with:
          tagName: app-v__VERSION__
          releaseName: "Personal Finance Tracker v__VERSION__"
          releaseBody: "Automated build of Personal Finance Tracker"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file

      - name: install frontend dependencies
        run: pnpm install

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: build Android APK
        run: |
          cd src-tauri
          cargo tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/target/release/bundle/apk/*.apk
          retention-days: 30

  build-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: install frontend dependencies
        run: pnpm install

      - name: build iOS app
        run: |
          cd src-tauri
          cargo tauri ios build

      - name: upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: src-tauri/target/release/bundle/ios/*.app
          retention-days: 30

  create-release:
    needs: [build-desktop, build-android, build-ios]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: create release notes
        run: |
          cat > release_notes.md << 'EOF'
          # Personal Finance Tracker Release
          
          ## Artifacts
          - **macOS**: Universal binary (Intel + Apple Silicon)
          - **Linux**: AppImage
          - **Windows**: MSI installer
          - **Android**: APK
          - **iOS**: App bundle
          
          All data is stored locally. Works offline.
          EOF

      - name: create GitHub release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          artifacts: "artifacts/**/*"
          artifactErrorsFailBuild: false
          body: |
            # Personal Finance Tracker Release
            
            ## Artifacts
            - **macOS**: Universal binary (Intel + Apple Silicon)
            - **Linux**: AppImage
            - **Windows**: MSI installer
            - **Android**: APK
            - **iOS**: App bundle
            
            All data is stored locally. Works offline.
