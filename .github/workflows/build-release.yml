
name: 'Build and Release All Platforms'

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  PNPM_CACHE_HOME: ~/.pnpm-store

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get app version
        id: get_version
        run: echo "APP_VERSION=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |-
            See the assets to download this version and install.
            
            **Version:** ${{ env.APP_VERSION }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            os_name: 'macos-arm64'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            os_name: 'macos-intel'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            os_name: 'linux'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            os_name: 'windows'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-rust-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-
          workspaces: './src-tauri -> target'

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: 'build'
          args: '--target ${{ matrix.target }}'
          upload-artifact: false # We will upload artifacts manually

      - name: Upload desktop artifacts
        run: |
          if [ "${{ matrix.os_name }}" == "linux" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle/ -name "*.AppImage" -exec mv {} personal-finance-tracker-linux.AppImage \; 
            find src-tauri/target/${{ matrix.target }}/release/bundle/ -name "*.deb" -exec mv {} personal-finance-tracker-linux.deb \; 
            ls -l personal-finance-tracker-linux.AppImage
            ls -l personal-finance-tracker-linux.deb
            
            assets="personal-finance-tracker-linux.AppImage personal-finance-tracker-linux.deb"
          elif [ "${{ matrix.os_name }}" == "windows" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle/ -name "*.msi" -exec mv {} personal-finance-tracker-windows.msi \; 
            find src-tauri/target/${{ matrix.target }}/release/ -name "*.exe" -exec mv {} personal-finance-tracker-windows.exe \; 
            ls -l personal-finance-tracker-windows.msi
            ls -l personal-finance-tracker-windows.exe
            
            assets="personal-finance-tracker-windows.msi personal-finance-tracker-windows.exe"
          elif [ "${{ matrix.os_name }}" == "macos-intel" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle/ -name "*.app" -exec mv {} personal-finance-tracker-macos-intel.app \; 
            ls -l personal-finance-tracker-macos-intel.app
            
            assets="personal-finance-tracker-macos-intel.app"
          elif [ "${{ matrix.os_name }}" == "macos-arm64" ]; then
            find src-tauri/target/${{ matrix.target }}/release/bundle/ -name "*.app" -exec mv {} personal-finance-tracker-macos-arm64.app \; 
            ls -l personal-finance-tracker-macos-arm64.app
            
            assets="personal-finance-tracker-macos-arm64.app"
          fi
          
          for asset in $assets; do
            gh release upload ${{ needs.create-release.outputs.upload_url }} "$asset" --repo ${{ github.repository }}
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android APK
        run: npx eas build --platform android --local --output=personal-finance-tracker-android.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # Required for EAS builds

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: personal-finance-tracker-android-apk
          path: personal-finance-tracker-android.apk

      - name: Upload Android APK to Release
        run: gh release upload ${{ needs.create-release.outputs.upload_url }} personal-finance-tracker-android.apk --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mobile-ios:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install pnpm dependencies
        run: pnpm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build iOS IPA
        run: npx eas build --platform ios --local --output=personal-finance-tracker-ios.ipa
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # Required for EAS builds
          # For iOS, you might need additional secrets for code signing, e.g., APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: personal-finance-tracker-ios-ipa
          path: personal-finance-tracker-ios.ipa

      - name: Upload iOS IPA to Release
        run: gh release upload ${{ needs.create-release.outputs.upload_url }} personal-finance-tracker-ios.ipa --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

