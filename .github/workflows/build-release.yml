name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: stable

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        id: create_release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}

  # ===== DESKTOP BUILDS =====
  
  build-desktop:
    name: Build Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: "Linux x86_64", os: "ubuntu-latest", target: "x86_64-unknown-linux-gnu" }
          - { name: "Windows x86_64", os: "windows-latest", target: "x86_64-pc-windows-msvc" }
          - { name: "macOS Intel", os: "macos-latest", target: "x86_64-apple-darwin" }
          - { name: "macOS ARM64", os: "macos-latest", target: "aarch64-apple-darwin" }
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
          
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build frontend
        run: pnpm build
        
      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.platform.target }}
        
      - name: Prepare artifacts (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          mkdir -p build/linux
          cp src-tauri/target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage build/linux/ || true
          cp src-tauri/target/${{ matrix.platform.target }}/release/bundle/deb/*.deb build/linux/ || true
          
      - name: Prepare artifacts (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build/windows -Force | Out-Null
          Copy-Item -Path "src-tauri/target/${{ matrix.platform.target }}/release/bundle/msi/*.msi" -Destination "build/windows/" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/${{ matrix.platform.target }}/release/Personal Finance Tracker.exe" -Destination "build/windows/PersonalFinanceTracker-portable.exe" -Force -ErrorAction SilentlyContinue
          
      - name: Prepare artifacts (macOS)
        if: matrix.platform.os == 'macos-latest'
        run: |
          mkdir -p build/macos
          cd src-tauri/target/${{ matrix.platform.target }}/release/bundle/macos
          hdiutil create -volname "Personal Finance Tracker" -srcfolder . -ov -format UDZO "Personal-Finance-Tracker-${{ matrix.platform.target }}.dmg"
          mv "Personal-Finance-Tracker-${{ matrix.platform.target }}.dmg" ../../../../../../../../build/macos/
          
      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/linux/*
            build/windows/*
            build/macos/*.dmg
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ===== MOBILE BUILDS =====

  build-mobile:
    name: Build Mobile (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,aarch64-apple-ios-sim' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Mobile App
        run: pnpm tauri build --target ${{ matrix.platform }}
        continue-on-error: true

      - name: Upload Mobile artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            src-tauri/gen/android/**/*.apk
            src-tauri/gen/apple/**/*.ipa
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ===== FINALIZATION =====

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [build-desktop, build-mobile]
    if: always()
    steps:
      - name: Check Release Status
        run: |
          echo "## Multi-Platform Build Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          echo "- Desktop Builds: ${{ needs.build-desktop.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile Builds: ${{ needs.build-mobile.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release URL" >> $GITHUB_STEP_SUMMARY
          echo "Release artifacts available at: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
