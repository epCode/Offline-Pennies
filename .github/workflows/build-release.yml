name: Multi-Platform Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: stable

jobs:
  # ===== DESKTOP BUILDS =====
  build-desktop:
    name: Build Desktop (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    env:
      APPIMAGE_EXTRACT_AND_RUN: 1 # Add this here
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: "Linux x86_64", os: "ubuntu-latest", target: "x86_64-unknown-linux-gnu" }
          - { name: "Windows x86_64", os: "windows-latest", target: "x86_64-pc-windows-msvc" }
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
          
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}
          
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          
      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build frontend
        run: pnpm build
        
      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.platform.target }}
        
      - name: Prepare artifacts (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          mkdir -p build/linux
          cp src-tauri/target/${{ matrix.platform.target }}/release/bundle/appimage/*.AppImage build/linux/ || true
          cp src-tauri/target/${{ matrix.platform.target }}/release/bundle/deb/*.deb build/linux/ || true
          
      - name: Prepare artifacts (Windows)
        if: matrix.platform.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build/windows -Force | Out-Null
          Copy-Item -Path "src-tauri/target/${{ matrix.platform.target }}/release/bundle/msi/*.msi" -Destination "build/windows/" -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "src-tauri/target/${{ matrix.platform.target }}/release/Personal Finance Tracker.exe" -Destination "build/windows/PersonalFinanceTracker-portable.exe" -Force -ErrorAction SilentlyContinue

      - name: Upload Linux Artifacts
        if: matrix.platform.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: build/linux/*
          retention-days: 1
          if-no-files-found: ignore
          
      - name: Upload Windows Artifacts
        if: matrix.platform.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: build/windows/*
          retention-days: 1
          if-no-files-found: ignore

  # ===== MOBILE BUILDS =====
# ===== MOBILE BUILDS =====
  build-mobile:
    name: Build Mobile (${{ matrix.platform }})
    runs-on: ${{ matrix.platform == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios,aarch64-apple-ios-sim' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      # Note: For Android, this creates APKs in src-tauri/gen/android/app/build/outputs/apk/
      - name: Build Mobile App
        run: pnpm tauri build --target ${{ matrix.platform }}
        continue-on-error: true 

      - name: Upload Mobile Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifacts
          # This updated path catches Tauri v2's nested output structure
          path: |
            src-tauri/gen/android/**/*.apk
            src-tauri/gen/android/**/*.aab
            src-tauri/gen/apple/**/*.ipa
            src-tauri/gen/apple/**/*.app
          retention-days: 1
          if-no-files-found: warn

  # ===== FINALIZATION & RELEASE =====
  publish-release:
    name: Publish Release Draft
    needs: [build-desktop, build-mobile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Tag Name
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "TAG_NAME=manual-build-${{ github.run_number }}" >> $GITHUB_ENV
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List Artifacts (Debug)
        run: ls -R release-artifacts/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: true
          prerelease: false
          # Targets the specific commit that triggered this run
          target_commitish: ${{ github.sha }}
          # This will find everything downloaded in the previous step
          files: |
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.apk
            release-artifacts/**/*.aab
            release-artifacts/**/*.ipa