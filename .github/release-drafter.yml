name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
  - title: '🔧 Improvements'
    labels:
      - 'improvement'
      - 'refactor'
      - 'perf'
      - 'performance'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔐 Security'
    labels:
      - 'security'
  - title: '⚙️ Dependencies'
    labels:
      - 'dependencies'
      - 'deps'

change-template: '- $TITLE (@$AUTHOR) (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'bug'
      - 'bugfix'
      - 'fix'
  default: patch

template: |
  ## Changes

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

  ---

  **Full Changelog**: https://github.com/$OWNER/$REPO/compare/$PREVIOUS_TAG...$THIS_TAG
